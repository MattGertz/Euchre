<?xml version="1.0" encoding="UTF-8"?>
<svg width="456" height="456" viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg">
    <!-- Card shape -->
    <rect x="88" y="48" width="280" height="360" rx="20" ry="20" fill="white" />
    <!-- J top-left -->
    <text x="108" y="108" font-family="serif" font-size="52" font-weight="bold" fill="black">J</text>
    <!-- Spade symbol top-left small -->
    <text x="112" y="148" font-family="serif" font-size="36" fill="black">&#x2660;</text>
    <!-- Large spade center -->
    <text x="228" y="290" font-family="serif" font-size="160" fill="black" text-anchor="middle">&#x2660;</text>
    <!-- J bottom-right (inverted) -->
    <text x="348" y="392" font-family="serif" font-size="52" font-weight="bold" fill="black" text-anchor="end" transform="rotate(180,332,370)">J</text>
    <!-- Spade symbol bottom-right small (inverted) -->
    <text x="344" y="352" font-family="serif" font-size="36" fill="black" text-anchor="end" transform="rotate(180,328,334)">&#x2660;</text>
</svg>